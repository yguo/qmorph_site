<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CaliforniaWellDone — AI Receptionist Demo</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .demo-hero {
      padding: 8rem 2rem 2rem;
      text-align: center;
      position: relative;
    }
    .demo-hero::before {
      content: '';
      position: absolute; top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(ellipse at 50% 30%, rgba(251,146,60,0.06) 0%, transparent 60%),
                  radial-gradient(ellipse at 70% 60%, rgba(108,245,194,0.04) 0%, transparent 50%);
      pointer-events: none;
    }
    .demo-hero h1 {
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 700; letter-spacing: -1.5px; margin-bottom: 0.5rem;
    }
    .demo-hero h1 span {
      background: linear-gradient(135deg, #fb923c, #f472b6);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .demo-hero p {
      color: var(--text-dim); font-size: 1rem; max-width: 440px; margin: 0 auto;
    }

    /* Main layout */
    .demo-stage {
      max-width: 1060px; margin: 0 auto;
      padding: 2rem 2rem 6rem;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 2.5rem;
      align-items: start;
    }

    /* Phone */
    .demo-phone {
      width: 320px;
      background: #000;
      border-radius: 40px;
      padding: 14px;
      border: 2px solid #333;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
      position: sticky; top: 80px;
    }
    .demo-screen {
      background: var(--bg-card);
      border-radius: 28px;
      overflow: hidden;
      min-height: 580px;
      display: flex; flex-direction: column;
    }
    .ph-notch {
      width: 100px; height: 28px;
      background: #000; border-radius: 0 0 16px 16px;
      margin: 0 auto;
    }
    .ph-status {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 20px 6px;
      font-size: 0.72rem; font-weight: 600; color: var(--text);
    }
    .ph-call {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 1rem;
      text-align: center;
    }
    .ph-avatar-ring {
      width: 96px; height: 96px;
      border-radius: 50%;
      border: 3px solid var(--accent4);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 1.25rem;
      animation: ring-pulse 2s ease infinite;
    }
    @keyframes ring-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(251,146,60,0.3); }
      50% { box-shadow: 0 0 0 14px rgba(251,146,60,0); }
    }
    .ph-avatar-inner {
      width: 74px; height: 74px;
      border-radius: 50%;
      background: rgba(251,146,60,0.12);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
    }
    .ph-name {
      font-size: 1.15rem; font-weight: 700; margin-bottom: 0.2rem;
      letter-spacing: -0.3px;
    }
    .ph-timer {
      font-family: var(--mono); font-size: 0.82rem;
      color: var(--accent4); margin-bottom: 1.5rem;
    }
    .ph-timer .dot {
      display: inline-block; width: 6px; height: 6px;
      border-radius: 50%; background: var(--accent4);
      margin-right: 6px; vertical-align: middle;
      animation: pulse-dot 1.2s ease infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; } 50% { opacity: 0.3; }
    }

    /* Mini waveform */
    .ph-wave {
      display: flex; gap: 3px; align-items: center;
      justify-content: center;
      height: 32px; margin-bottom: 1.5rem;
    }
    .ph-wave-bar {
      width: 3px; border-radius: 2px;
      background: var(--accent4); opacity: 0.6;
      animation: wave-bar 1.2s ease-in-out infinite;
    }
    .ph-wave-bar:nth-child(1) { height: 10px; animation-delay: 0s; }
    .ph-wave-bar:nth-child(2) { height: 18px; animation-delay: 0.1s; }
    .ph-wave-bar:nth-child(3) { height: 26px; animation-delay: 0.2s; }
    .ph-wave-bar:nth-child(4) { height: 14px; animation-delay: 0.3s; }
    .ph-wave-bar:nth-child(5) { height: 22px; animation-delay: 0.15s; }
    .ph-wave-bar:nth-child(6) { height: 30px; animation-delay: 0.25s; }
    .ph-wave-bar:nth-child(7) { height: 16px; animation-delay: 0.05s; }
    .ph-wave-bar:nth-child(8) { height: 20px; animation-delay: 0.35s; }
    .ph-wave-bar:nth-child(9) { height: 12px; animation-delay: 0.2s; }
    @keyframes wave-bar {
      0%, 100% { transform: scaleY(0.4); }
      50% { transform: scaleY(1); }
    }

    /* Phone buttons */
    .ph-actions {
      display: flex; gap: 1.5rem; justify-content: center;
      margin-top: auto; padding-bottom: 0.5rem;
    }
    .ph-btn {
      width: 52px; height: 52px; border-radius: 50%;
      border: none; display: flex;
      align-items: center; justify-content: center;
      font-size: 1.3rem; cursor: default;
    }
    .ph-btn-mute { background: var(--bg-elevated); border: 1px solid var(--border); }
    .ph-btn-end { background: #ef4444; }
    .ph-btn-speaker { background: var(--bg-elevated); border: 1px solid var(--border); }

    /* Transcript panel */
    .transcript-panel {
      min-height: 580px;
      display: flex; flex-direction: column;
    }
    .transcript-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .transcript-header h2 {
      font-size: 1.1rem; font-weight: 700;
      letter-spacing: -0.3px;
    }
    .transcript-live {
      font-family: var(--mono); font-size: 0.68rem;
      text-transform: uppercase; letter-spacing: 1.5px;
      color: var(--accent4);
      display: flex; align-items: center; gap: 6px;
    }
    .transcript-live::before {
      content: ''; width: 6px; height: 6px;
      border-radius: 50%; background: var(--accent4);
      animation: pulse-dot 1.2s ease infinite;
    }
    .transcript-feed {
      display: flex; flex-direction: column; gap: 1rem;
      flex: 1;
    }

    /* Transcript bubbles */
    .t-bubble {
      display: flex; gap: 0.75rem;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .t-bubble.show {
      opacity: 1; transform: translateY(0);
    }
    .t-bubble.agent { align-self: flex-start; max-width: 88%; }
    .t-bubble.caller { align-self: flex-end; flex-direction: row-reverse; max-width: 88%; }

    .t-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700; flex-shrink: 0;
    }
    .t-bubble.agent .t-avatar {
      background: rgba(251,146,60,0.15); color: var(--accent4);
    }
    .t-bubble.caller .t-avatar {
      background: rgba(96,165,250,0.15); color: var(--accent3);
    }

    .t-content {
      padding: 0.7rem 1rem;
      border-radius: 14px;
      font-size: 0.88rem; line-height: 1.6;
    }
    .t-bubble.agent .t-content {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text-dim);
    }
    .t-bubble.caller .t-content {
      background: rgba(96,165,250,0.1);
      border: 1px solid rgba(96,165,250,0.2);
      border-bottom-right-radius: 4px;
      color: var(--text-dim);
    }
    .t-label {
      font-family: var(--mono); font-size: 0.68rem;
      text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 0.2rem;
    }
    .t-bubble.agent .t-label { color: var(--accent4); }
    .t-bubble.caller .t-label { color: var(--accent3); }

    .t-typing {
      display: inline-flex; gap: 4px; padding: 4px 0;
    }
    .t-typing span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--text-muted);
      animation: typing 1.2s ease infinite;
    }
    .t-typing span:nth-child(2) { animation-delay: 0.2s; }
    .t-typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing {
      0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-3px); }
    }

    /* Replay */
    .replay-btn {
      display: none;
      margin: 2rem auto 0;
      background: var(--bg-elevated); border: 1px solid var(--border);
      color: var(--text-dim); font-family: var(--font);
      font-size: 0.88rem; padding: 0.7rem 1.8rem;
      border-radius: 30px; cursor: pointer;
      transition: all 0.2s;
    }
    .replay-btn:hover {
      border-color: var(--accent4); color: var(--accent4);
    }
    .replay-btn.show { display: inline-flex; align-items: center; gap: 8px; }

    @media (max-width: 860px) {
      .demo-stage {
        grid-template-columns: 1fr;
        gap: 2rem;
        padding: 1.5rem 1.25rem 4rem;
      }
      .demo-phone {
        width: 280px; margin: 0 auto;
        position: static;
        padding: 10px;
        border-radius: 34px;
      }
      .demo-screen { min-height: 500px; border-radius: 24px; }
      .ph-notch { width: 80px; height: 24px; border-radius: 0 0 12px 12px; }
      .transcript-panel { min-height: auto; }
      .demo-hero { padding: 6rem 1.25rem 1.5rem; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo" style="text-decoration:none;">Q.Morph</a>
  <div class="nav-links">
    <a href="index.html" data-i18n="nav_home">首页</a>

  </button>

  <div class="mobile-menu" onclick="event.stopPropagation()">
    <a href="index.html" data-i18n="nav_home">首页</a>

    <a href="demo.html" style="color:var(--accent4);">Demo</a>

  <h1><span>CaliforniaWellDone</span></h1>

<div class="demo-stage">

  <!-- Phone -->
  <div class="demo-phone">
    <div class="demo-screen">
      <div class="ph-notch"></div>
      <div class="ph-status">
        <span>9:41</span>
        <span style="letter-spacing:1px;">●●●●</span>
      </div>
      <div class="ph-call">
        <div class="ph-avatar-ring">
          <div class="ph-avatar-inner">🍽️</div>
        </div>
        <div class="ph-name">California Well Done</div>
        <div class="ph-timer"><span class="dot"></span><span id="call-timer">00:00</span></div>
        <div class="ph-wave">
          <div class="ph-wave-bar"></div>
          <div class="ph-wave-bar"></div>
          <div class="ph-wave-bar"></div>
          <div class="ph-wave-bar"></div>
          <div class="ph-wave-bar"></div>
          <div class="ph-wave-bar"></div>
          <div class="ph-wave-bar"></div>
          <div class="ph-wave-bar"></div>
          <div class="ph-wave-bar"></div>
        </div>
        <div class="ph-actions">
          <button class="ph-btn ph-btn-mute">🔇</button>

</div>

<script src="https://elevenlabs.io/convai-widget/index.js" async></script>
<script src="app.js"></script>
<script>
const SCRIPT = [
  { role:'agent',  text:"Hello, thank you for calling California Well Done! How can I help you today?" },
  { role:'caller', text:"Hi, I'd like to make a reservation for tonight." },
  { role:'agent',  text:"Of course! How many guests will be dining tonight?" },
  { role:'caller', text:"It'll be 4 of us, around 7 PM if possible." },
  { role:'agent',  text:"Let me check availability… Great news! I have a table for 4 at 7:00 PM. May I have your name please?" },
  { role:'caller', text:"Sarah Chen." },
  { role:'agent',  text:"Perfect, Sarah! Your reservation is confirmed — table for 4 tonight at 7:00 PM. You'll receive a confirmation text shortly. Is there anything else I can help with?" },
  { role:'caller', text:"Do you have vegetarian options?" },
  { role:'agent',  text:"Absolutely! We have several vegetarian dishes including our house garden salad, grilled veggie burger, and pasta primavera. Our chef can also accommodate vegan and gluten-free requests." },
  { role:'caller', text:"Great, that's all. Thank you!" },
  { role:'agent',  text:"You're welcome, Sarah! We look forward to seeing you tonight. Have a wonderful day!" },
];

let timerInterval, timerSec = 0, demoTimeout = [];

function fmtTime(s) {
  const m = String(Math.floor(s / 60)).padStart(2, '0');
  const ss = String(s % 60).padStart(2, '0');
  return m + ':' + ss;
}

function startDemo() {
  const feed = document.getElementById('transcript-feed');
  const btn = document.getElementById('replay-btn');
  feed.innerHTML = '';
  btn.classList.remove('show');
  demoTimeout.forEach(t => clearTimeout(t));
  demoTimeout = [];
  clearInterval(timerInterval);
  timerSec = 0;
  document.getElementById('call-timer').textContent = '00:00';
  timerInterval = setInterval(() => {
    timerSec++;
    document.getElementById('call-timer').textContent = fmtTime(timerSec);
  }, 1000);

  let delay = 800;
  SCRIPT.forEach((line, i) => {
    const typingDelay = delay;
    delay += 600;
    const showDelay = delay;
    const readTime = Math.max(1200, line.text.length * 35);
    delay += readTime;

    demoTimeout.push(setTimeout(() => {
      const bubble = document.createElement('div');
      bubble.className = 't-bubble ' + line.role;
      const avatarLabel = line.role === 'agent' ? 'AI' : 'C';
      bubble.innerHTML =
        '<div class="t-avatar">' + avatarLabel + '</div>' +
        '<div class="t-content">' +
          '<div class="t-label">' + (line.role === 'agent' ? 'Agent' : 'Caller') + '</div>' +
          '<div class="t-typing"><span></span><span></span><span></span></div>' +
        '</div>';
      feed.appendChild(bubble);
      requestAnimationFrame(() => bubble.classList.add('show'));
      feed.scrollTop = feed.scrollHeight;
    }, typingDelay));

    demoTimeout.push(setTimeout(() => {
      const bubbles = feed.querySelectorAll('.t-bubble');
      const last = bubbles[bubbles.length - 1];
      if (last) {
        const content = last.querySelector('.t-content');
        const label = line.role === 'agent' ? 'Agent' : 'Caller';
        content.innerHTML = '<div class="t-label">' + label + '</div>' + line.text;
      }
      feed.scrollTop = feed.scrollHeight;
    }, showDelay));
  });

  demoTimeout.push(setTimeout(() => {
    clearInterval(timerInterval);
    btn.classList.add('show');
  }, delay + 500));
}

document.addEventListener('DOMContentLoaded', () => {
  setTimeout(startDemo, 600);
});
</script>
</body>
